model_list:
  # ── T1: Scout — Gemini Flash Lite (FASTEST: ~0.4-0.7s) ───────────
  - model_name: "claude-t1"
    litellm_params:
      model: "openrouter/google/gemini-2.5-flash-lite"
      api_key: "os.environ/OPENROUTER_API_KEY"
      supports_function_calling: true
      max_tokens: 4096
      temperature: 0.3
      request_timeout: 30
    model_info:
      rpm: 30                # requests per minute — stay under free-tier limits
      tpm: 100000            # tokens per minute

  # ── T1-FREE: Scout fallback (free Llama) ──────────────────────────
  - model_name: "claude-t1-free"
    litellm_params:
      model: "openrouter/meta-llama/llama-3.1-8b-instruct:free"
      api_key: "os.environ/OPENROUTER_API_KEY"
      supports_function_calling: true
      max_tokens: 4096
      temperature: 0.3
      request_timeout: 30
    model_info:
      rpm: 30
      tpm: 80000

  # ── T2: Analyst — Gemma 4 31B FREE (₹0) ──────────────────────────
  - model_name: "claude-t2"
    litellm_params:
      model: "openrouter/google/gemma-4-31b-it:free"
      api_key: "os.environ/OPENROUTER_API_KEY"
      supports_function_calling: true
      max_tokens: 8192
      temperature: 0.3
      request_timeout: 60
    model_info:
      rpm: 20                # free-tier is aggressively limited upstream
      tpm: 80000

  # ── T2-FREE: Gemma fallback (free, avoids paid t3 on rate-limit) ──
  - model_name: "claude-t2-free"
    litellm_params:
      model: "openrouter/google/gemma-4-31b-it:free"
      api_key: "os.environ/OPENROUTER_API_KEY"
      supports_function_calling: true
      max_tokens: 8192
      temperature: 0.3
      request_timeout: 60
    model_info:
      rpm: 20
      tpm: 80000

  # ── T3: Architect — DeepSeek V4 Flash PAID (fast, no timeout) ───
  - model_name: "claude-t3"
    litellm_params:
      model: "openrouter/deepseek/deepseek-v4-flash"
      api_key: "os.environ/OPENROUTER_API_KEY"
      supports_function_calling: true
      max_tokens: 8192       # ← reduced from 16384 to stay within credit budget
      temperature: 0.2
      request_timeout: 120
    model_info:
      rpm: 30
      tpm: 120000

  # ── T3-COT: Reasoning / DeepSeek R1 Distill Qwen (paid CoT) ───────
  - model_name: "claude-t3-cot"
    litellm_params:
      model: "openrouter/deepseek/deepseek-r1-distill-qwen-32b"
      api_key: "os.environ/OPENROUTER_API_KEY"
      supports_function_calling: true
      max_tokens: 8192
      temperature: 0.2
      request_timeout: 120
    model_info:
      rpm: 30
      tpm: 120000

  # ── Claude Proxy Fallbacks (Port 8080) ──────────────────────────
  - model_name: "claude-proxy-flash"
    litellm_params:
      model: "anthropic/gemini-3-flash-agent"
      api_base: "http://localhost:8080"
      api_key: "sk-dummy"
      max_tokens: 4096
      temperature: 0.3
      request_timeout: 30

  - model_name: "claude-proxy-pro"
    litellm_params:
      model: "anthropic/gemini-3.1-pro-high"
      api_base: "http://localhost:8080"
      api_key: "sk-dummy"
      max_tokens: 8192
      temperature: 0.2
      request_timeout: 60

litellm_settings:
  drop_params: true
  num_retries: 3             # ← increased from 2 for better resilience
  request_timeout: 120
  set_verbose: false
  callbacks: [custom_callbacks.proxy_handler_instance]

router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 3             # ← increased from 2
  retry_after: 8             # ← increased from 5 — more backoff for rate limits
  allowed_fails: 2           # ← increased from 1 — less aggressive cooldown
  cooldown_time: 30          # ← NEW: cool down a deployment for 30s after failures
  fallbacks:
    - {"claude-t1": ["claude-t2"]}
    - {"claude-t1-free": ["claude-t2"]}
    - {"claude-t2": ["claude-t2-free"]}
    - {"claude-t2-free": []}
    - {"claude-t3": ["claude-t2"]}
    - {"claude-t3-cot": ["claude-t2"]}

